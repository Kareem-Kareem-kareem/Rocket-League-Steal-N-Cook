name: Build StealAndCook Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone BakkesMod SDK
        run: git clone https://github.com/bakkesmodorg/BakkesModSDK ../BakkesModSDK

      - name: Configure CMake (Ninja + MSVC)
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DBAKKESMODSDK_PATH="${{ github.workspace }}/../BakkesModSDK"

      - name: Build
        run: cmake --build build

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: StealAndCook-dll
          path: build/Release/StealAndCook.dll
