name: Build StealAndCook Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Clone BakkesMod SDK
        run: |
          git clone https://github.com/bakkesmodorg/BakkesModSDK ../BakkesModSDK

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DBAKKESMODSDK_PATH="${{ github.workspace }}/../BakkesModSDK"

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: StealAndCook-dll
          path: build/Release/StealAndCook.dll
